<!DOCTYPE html>
<html>
<head>
  <style>
    .information {
      background-color: white;
      color: black;
      padding: 10px;
    }
  </style>
<title>Locators</title>
</head>
<body>
  <h2>Contact Selenium</h2>

  <form>
    <label>
      <input type="radio" name="gender" value="m"> Male
    </label> &nbsp;
    <label>
      <input type="radio" name="gender" value="o"> Others
    </label> &nbsp;
    <label>
      <input type="radio" name="gender" value="f"> Female
    </label>
    <br><br>

    <label for="fname">First name:</label><br>
    <input class="information" type="text" id="fname" name="fname" value="Jane"><br><br>

    <label for="lname">Last name:</label><br>
    <input class="information" type="text" id="lname" name="lname" value="Doe"><br><br>

    <label>
      <input type="checkbox" name="newsletter" value="1"> Subscribe to Newsletter
    </label><br><br>

    <input type="submit" value="Submit">
  </form>

  <p>
    To know more about Selenium, visit the official page:
   <a href="https://www.google.com/">Google Page</a>
    <a href="https://www.selenium.dev/">Selenium Official Page</a>
  </p>
</body>
</html>
